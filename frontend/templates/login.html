<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRIS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1421;
    --border: #1a2540;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --text: #e8edf5;
    --muted: #5a6a85;
    --danger: #ef4444;
    --success: #22c55e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    pointer-events: none;
  }
  .orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -200px; }
  .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; }
  .login-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    width: 420px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  .logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 36px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  input[type=text], input[type=password] {
    width: 100%; padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: #fff; font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .hint-cards { display: flex; gap: 10px; margin-top: 28px; }
  .hint { flex: 1; background: rgba(79,142,247,0.06); border: 1px solid rgba(79,142,247,0.15); border-radius: 10px; padding: 12px; }
  .hint-role { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .hint-creds { font-size: 12px; color: var(--muted); }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; display: none; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <div class="logo-text">SRIS</div>
  </div>
  <div class="logo-sub">Student Result Intelligence System</div>
  <div class="field">
    <label>USERNAME</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
  </div>
  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  </div>
  <button class="btn" onclick="doLogin()">Sign In →</button>
  <div class="error-msg" id="err">Invalid credentials. Please try again.</div>
  <div class="hint-cards">
    <div class="hint">
      <div class="hint-role">ADMIN</div>
      <div class="hint-creds">admin / admin123</div>
    </div>
    <div class="hint">
      <div class="hint-role">TEACHER</div>
      <div class="hint-creds">teacher / teacher123</div>
    </div>
  </div>
</div>
<script>
  document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    err.style.display = 'none';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        credentials: 'include',
        body: JSON.stringify({username, password})
      });
      const data = await res.json();
      if (res.ok) { window.location.href = '/dashboard'; }
      else { err.style.display = 'block'; }
    } catch(e) { err.style.display = 'block'; }
  }
</script>
</body>
</html>
